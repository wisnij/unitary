<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <style>
      @font-face {
        font-family: 'DejaVu Sans Mono';
        font-weight: 700;
        src: url('DejaVuSansMono-Bold.ttf') format('truetype');
      }
    </style>
    <!-- DejaVu Sans Mono: bundle font files in app for guaranteed rendering -->
    <!-- Copyright (c) 2003 Bitstream Inc. DejaVu changes in public domain -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#060d18"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- LAYER: background — set display:none to hide -->
  <g id="background" display="inline">
    <rect width="1024" height="1024" fill="url(#bg)"/>
  </g>

  <!-- TEST ONLY: inscribed circle showing circular crop boundary -->
  <!-- <circle cx="512" cy="512" r="512" fill="none" stroke="#ff4444" stroke-width="4" opacity="0.8"/> -->

  <!-- LAYER: foreground — set display:none to hide -->
  <g id="foreground" display="inline">
    <g transform="translate(0, 80)">

      <!-- Arc: arms at x=340/684, bottom at y=580, radius=172 -->

      <!-- Glow layer -->
      <path
        d="M 340,380 L 340,580 A 172,172 0 0 0 684,580 L 684,380"
        fill="none"
        stroke="#00d4ff"
        stroke-width="84"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"
        opacity="0.45"
      />

      <!-- Main U arrow stroke -->
      <path
        d="M 340,380 L 340,580 A 172,172 0 0 0 684,580 L 684,380"
        fill="none"
        stroke="#00d4ff"
        stroke-width="57"
        stroke-linecap="round"
        stroke-linejoin="round"
      />

      <!-- Arrowhead glow layer -->
      <g filter="url(#glow)" opacity="0.45">
        <polygon points="340,280 250,400 430,400" fill="#00d4ff"/>
        <polygon points="684,280 594,400 774,400" fill="#00d4ff"/>
      </g>

      <!-- Left arrowhead -->
      <polygon points="340,280 250,400 430,400" fill="#00d4ff"/>

      <!-- Right arrowhead -->
      <polygon points="684,280 594,400 774,400" fill="#00d4ff"/>

      <!-- Left label: m² -->
      <text
        x="340"
        y="240"
        text-anchor="middle"
        font-family="'DejaVu Sans Mono', monospace"
        font-size="216"
        font-weight="700"
        fill="#e0f7ff"
        letter-spacing="-12"
      >m²</text>

      <!-- Right label: ft² -->
      <text
        x="734"
        y="240"
        text-anchor="middle"
        font-family="'DejaVu Sans Mono', monospace"
        font-size="216"
        font-weight="700"
        fill="#e0f7ff"
        letter-spacing="-12"
      >ft²</text>

    </g>
  </g>

</svg>
