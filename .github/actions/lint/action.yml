name: Lint
description: Run flutter analyze and pre-commit hooks

runs:
  using: composite
  steps:
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.x'
        channel: stable
        cache: true
    - run: flutter pub get
      shell: bash
    - run: flutter analyze
      shell: bash
    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - uses: pre-commit/action@v3.0.1
      # generate-icons rasterizes the SVG via Inkscape, which is not installed
      # on the runner; the icon assets are committed and the hook guards drift
      # locally, so skip it in CI.
      env:
        SKIP: generate-icons
