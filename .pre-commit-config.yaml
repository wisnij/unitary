repos:
  - repo: local
    hooks:
      - id: import-gnu-units
        name: Import GNU units database
        language: system
        entry: bash -c 'dart run tool/import_gnu_units.dart && dart run tool/generate_predefined_units.dart'
        files: |
          (?x)^(
            tool/gnu_units/ |
            tool/import_gnu_units
          )
      - id: generate-predefined-units
        name: Regenerate predefined units
        language: system
        entry: dart run tool/generate_predefined_units.dart
        files: |
          (?x)^(
            lib/core/domain/data/units-supplementary\.json |
            tool/generate_predefined_units
          )
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2
        args: [--fix]
        exclude: |
          (?x)^(
            (.*/)?LICENSE.md |
            openspec/.*\.md
          )$
        verbose: false
  - repo: https://github.com/Cretezy/dart-format-pre-commit
    rev: f728adc8b9ba2b414959cc8beb892e480425cf60
    hooks:
      - id: dart-format
