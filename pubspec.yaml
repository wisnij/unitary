name: unitary
description: "Unit converter and dimensional analysis calculator"
publish_to: 'none'
version: 0.9.0

environment:
  sdk: ^3.10.8

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  flutter_riverpod: ^3.2.1
  http: ^1.6.0
  package_info_plus: ^10.1.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1

dev_dependencies:
  cobertura: ^1.0.5
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  url_launcher_platform_interface: ^2.3.2

flutter:
  uses-material-design: true
  assets:
    - LICENSE.md

# Launcher/favicon icon generation.  Regenerate with tool/generate_icons.sh
# (which rasterizes assets/icon/unitary.svg, then runs flutter_launcher_icons).
flutter_launcher_icons:
  image_path: "assets/icon/unitary.png"
  android: true
  adaptive_icon_background: "#060d18"
  adaptive_icon_foreground: "assets/icon/unitary.png"
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/unitary.png"
    background_color: "#060d18"
    theme_color: "#060d18"
