name: Lint
description: Run flutter analyze and pre-commit hooks

runs:
  using: composite
  steps:
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.x'
        channel: stable
        cache: true
    - run: flutter pub get
      shell: bash
    - run: flutter analyze
      shell: bash
    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - uses: pre-commit/action@v3.0.1
