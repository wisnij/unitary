<head>
<title>tasks.html</title>
<meta http-equiv="Content-Type" content="text/html;charset=utf-8"/>

</head>

<body>

<h2 id="ast-restructure">1. AST Restructure</h2>
<ul class="task-list">
<li><label><input type="checkbox" />1.1 Add
<code>sealed abstract class ExpressionNode extends ASTNode</code> with
abstract <code>evaluate(EvalContext) → Quantity</code> to
<code>ast.dart</code></label></li>
<li><label><input type="checkbox" />1.2 Change <code>NumberNode</code>,
<code>UnitNode</code>, <code>BinaryOpNode</code>,
<code>UnaryOpNode</code> to extend <code>ExpressionNode</code> instead
of <code>ASTNode</code></label></li>
<li><label><input type="checkbox" />1.3 Rename <code>FunctionNode</code>
→ <code>FunctionCallNode</code> (class name, constructor,
<code>toString()</code>, all references in <code>ast.dart</code> and
<code>parser.dart</code>)</label></li>
<li><label><input type="checkbox" />1.4 Change
<code>FunctionCallNode</code> to extend
<code>ExpressionNode</code></label></li>
<li><label><input type="checkbox" />1.5 Mark <code>ASTNode</code> as
<code>sealed</code></label></li>
<li><label><input type="checkbox" />1.6 Remove <code>evaluate()</code>
from <code>ASTNode</code>; it now lives only on
<code>ExpressionNode</code></label></li>
<li><label><input type="checkbox" />1.7 Add
<code>class FunctionNameNode extends ASTNode</code> with
<code>final String name</code> and <code>final bool inverse</code>
fields and no <code>evaluate()</code></label></li>
<li><label><input type="checkbox" />1.8 Remove
<code>FunctionDefinitionRequestNode</code> (superseded by
<code>FunctionNameNode</code>)</label></li>
<li><label><input type="checkbox" />1.9 Write tests for
<code>FunctionNameNode</code> construction and field access</label></li>
<li><label><input type="checkbox" />1.10 Verify all existing tests pass
after AST changes</label></li>
</ul>
<h2 id="parse-parseexpression-migration">2. parse() → parseExpression()
Migration</h2>
<ul class="task-list">
<li><label><input type="checkbox" />2.1 Add
<code>parseExpression(String input) → ExpressionNode</code> to
<code>ExpressionParser</code> alongside the existing
<code>parse()</code>, implemented identically</label></li>
<li><label><input type="checkbox" />2.2 Update
<code>ExpressionParser.evaluate()</code> to call
<code>parseExpression()</code> internally</label></li>
<li><label><input type="checkbox" />2.3 Update all call sites of
<code>parse()</code> in production code to
<code>parseExpression()</code></label></li>
<li><label><input type="checkbox" />2.4 Update all call sites of
<code>parse()</code> in test code to
<code>parseExpression()</code></label></li>
<li><label><input type="checkbox" />2.5 Remove the old
<code>parse()</code> method from
<code>ExpressionParser</code></label></li>
<li><label><input type="checkbox" />2.6 Verify no remaining references
to <code>ExpressionParser.parse(</code> exist in the
codebase</label></li>
<li><label><input type="checkbox" />2.7 Verify all existing tests
pass</label></li>
</ul>
<h2 id="parsequery-entry-point">3. parseQuery() Entry Point</h2>
<ul class="task-list">
<li><label><input type="checkbox" />3.1 Write tests for
<code>parseQuery()</code>: bare known-function name returns
<code>FunctionNameNode(name, false)</code></label></li>
<li><label><input type="checkbox" />3.2 Write tests for
<code>parseQuery()</code>: <code>~funcName</code> returns
<code>FunctionNameNode(name, true)</code></label></li>
<li><label><input type="checkbox" />3.3 Write tests for
<code>parseQuery()</code>: non-function identifier returns
<code>UnitNode</code> (delegates to
<code>parseExpression()</code>)</label></li>
<li><label><input type="checkbox" />3.4 Write tests for
<code>parseQuery()</code>: multi-token input delegates to
<code>parseExpression()</code></label></li>
<li><label><input type="checkbox" />3.5 Write tests for
<code>parseQuery()</code>: no repository — all inputs delegate to
<code>parseExpression()</code></label></li>
<li><label><input type="checkbox" />3.6 Implement
<code>parseQuery(String input) → ASTNode</code> on
<code>ExpressionParser</code>: lex the input; if exactly one identifier
token that is a known function, return
<code>FunctionNameNode(name, false)</code>; if <code>~</code> followed
by one known-function identifier, return
<code>FunctionNameNode(name, true)</code>; otherwise call
<code>parseExpression()</code></label></li>
</ul>
<h2 id="unitaryfunction-definition-strings">4. UnitaryFunction
Definition Strings</h2>
<ul class="task-list">
<li><label><input type="checkbox" />4.1 Write tests for
<code>DefinedFunction.definitionExpression</code> and
<code>inverseExpression</code></label></li>
<li><label><input type="checkbox" />4.2 Write tests for
<code>BuiltinFunction.definitionExpression</code> and
<code>inverseExpression</code> returning <code>null</code></label></li>
<li><label><input type="checkbox" />4.3 Write tests for
<code>PiecewiseFunction.definitionExpression</code> and
<code>inverseExpression</code> returning <code>null</code></label></li>
<li><label><input type="checkbox" />4.4 Add abstract getters
<code>String? get definitionExpression</code> and
<code>String? get inverseExpression</code> to
<code>UnitaryFunction</code></label></li>
<li><label><input type="checkbox" />4.5 Implement getters on
<code>DefinedFunction</code>: return <code>forward</code> and
<code>inverse</code> respectively</label></li>
<li><label><input type="checkbox" />4.6 Implement getters on
<code>BuiltinFunction</code>: return <code>null</code> for
both</label></li>
<li><label><input type="checkbox" />4.7 Implement getters on
<code>PiecewiseFunction</code>: return <code>null</code> for
both</label></li>
</ul>
<h2 id="freeform-provider-and-state">5. Freeform Provider and State</h2>
<ul class="task-list">
<li><label><input type="checkbox" />5.1 Add
<code>FunctionDefinitionResult(functionName: String, definitionExpression: String?)</code>
to <code>freeform_state.dart</code></label></li>
<li><label><input type="checkbox" />5.2 Add
<code>InverseExpressionResult(functionName: String, inverseExpression: String?)</code>
to <code>freeform_state.dart</code></label></li>
<li><label><input type="checkbox" />5.3 Write provider tests: bare
function name input → <code>FunctionDefinitionResult</code></label></li>
<li><label><input type="checkbox" />5.4 Write provider tests: bare
inverse function name input →
<code>InverseExpressionResult</code></label></li>
<li><label><input type="checkbox" />5.5 Write provider tests: expression
input + function name output → <code>ConversionSuccess</code> via
<code>callInverse()</code></label></li>
<li><label><input type="checkbox" />5.6 Write provider tests: expression
input + <code>~funcName</code> output →
<code>EvaluationError</code></label></li>
<li><label><input type="checkbox" />5.7 Write provider tests: function
name output with no inverse → <code>EvaluationError</code></label></li>
<li><label><input type="checkbox" />5.8 Replace
<code>evaluateSingle()</code> and <code>evaluateConversion()</code> on
<code>FreeformNotifier</code> with a single
<code>evaluate(String input, String output)</code> method that calls
<code>parseQuery()</code> on each field and dispatches on the result
types per the design dispatch table</label></li>
<li><label><input type="checkbox" />5.9 Update
<code>freeform_screen.dart</code> to call
<code>evaluate(input, output)</code> instead of the two removed
methods</label></li>
</ul>
<h2 id="result-display">6. Result Display</h2>
<ul class="task-list">
<li><label><input type="checkbox" />6.1 Extend the exhaustive
<code>switch</code> in <code>ResultDisplay</code> to handle
<code>FunctionDefinitionResult</code>: display function name and
<code>definitionExpression</code> (or <code>"&lt;built-in&gt;"</code>
when null)</label></li>
<li><label><input type="checkbox" />6.2 Extend
<code>ResultDisplay</code> to handle
<code>InverseExpressionResult</code>: display function name and
<code>inverseExpression</code> (or <code>"no inverse defined"</code>
when null)</label></li>
<li><label><input type="checkbox" />6.3 Write widget tests for
<code>ResultDisplay</code> rendering
<code>FunctionDefinitionResult</code> with a non-null
string</label></li>
<li><label><input type="checkbox" />6.4 Write widget tests for
<code>ResultDisplay</code> rendering
<code>FunctionDefinitionResult</code> with null (built-in
placeholder)</label></li>
<li><label><input type="checkbox" />6.5 Write widget tests for
<code>ResultDisplay</code> rendering
<code>InverseExpressionResult</code> with a non-null string</label></li>
<li><label><input type="checkbox" />6.6 Write widget tests for
<code>ResultDisplay</code> rendering
<code>InverseExpressionResult</code> with null</label></li>
</ul>
<h2 id="final-verification">7. Final Verification</h2>
<ul class="task-list">
<li><label><input type="checkbox" />7.1 Run
<code>flutter test --reporter failures-only</code> and confirm all tests
pass</label></li>
<li><label><input type="checkbox" />7.2 Run <code>flutter analyze</code>
and confirm no linting errors</label></li>
<li><label><input type="checkbox" />7.3 Confirm no references to
<code>FunctionDefinitionRequestNode</code> remain in the
codebase</label></li>
<li><label><input type="checkbox" />7.4 Confirm no references to
<code>ExpressionParser.parse(</code> remain in the codebase</label></li>
<li><label><input type="checkbox" />7.5 Confirm no references to
<code>FunctionNode</code> (the old name) remain in the
codebase</label></li>
</ul>

</body>
</html>
