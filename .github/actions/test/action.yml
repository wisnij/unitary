name: Test
description: Run flutter tests with coverage reporting

runs:
  using: composite
  steps:
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.x'
        channel: stable
        cache: true
    - run: flutter pub get
      shell: bash
    - run: flutter test --coverage
      shell: bash
    - run: dart run cobertura convert --input coverage/lcov.info --output coverage/cobertura.xml
      shell: bash
    - uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/cobertura.xml
    - run: dart run cobertura show
      shell: bash
