name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/lint

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Set up environment
        run: |
          BUILD_TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "BUILD_METADATA=${BUILD_TIMESTAMP}.${SHORT_SHA}" >> $GITHUB_ENV
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Build Android APK
        run: >-
          flutter build apk
          --dart-define=BUILD_METADATA=${{ env.BUILD_METADATA }}
          --release
      - name: Build web
        run: >-
          flutter build web
          --dart-define=BUILD_METADATA=${{ env.BUILD_METADATA }}
          --release
          --wasm
      - name: Prepare Android APK
        run: cp build/app/outputs/flutter-apk/app-release.apk unitary-$VERSION.apk
      - name: Prepare web build
        run: zip -r unitary-$VERSION-web.zip build/web
      - name: Read release notes
        run: >-
          git tag -l --format="%(contents:body)" ${{ github.ref_name }} | tee RELEASE_NOTES.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create ${{ github.ref_name }}
          --notes-file RELEASE_NOTES.md
          --title "Release $VERSION"
          unitary-$VERSION.apk
          unitary-$VERSION-web.zip
